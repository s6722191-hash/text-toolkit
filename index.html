<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartText Tools - Free Online Text Formatter & Counter</title>
    
    <!-- SEO Meta Tags for Google Ranking -->
    <meta name="description" content="Free online text utility tool to count words, remove extra spaces, convert case, and generate clean slugs instantly.">
    <meta name="keywords" content="word counter, remove extra spaces online, case converter, text formatter, free text tools">
    <meta name="robots" content="index, follow">
    
    <!-- Tailwind CSS for Modern UI -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: sans-serif; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-4xl mx-auto">
        <!-- Header -->
        <header class="text-center mb-8">
            <h1 class="text-3xl md:text-4xl font-extrabold text-blue-500 mb-2">⚡ SmartText Utility Pro</h1>
            <p class="text-gray-400 text-sm md:text-base">Format, clean, and analyze your text instantly. No logs, 100% secure.</p>
        </header>

        <!-- Main Workspace -->
        <div class="bg-slate-800 rounded-2xl p-6 shadow-xl border border-slate-700 mb-6">
            <!-- Textarea -->
            <textarea id="mainInput" class="w-full h-64 bg-slate-900 text-slate-100 p-4 rounded-xl border border-slate-600 focus:outline-none focus:border-blue-500 resize-y placeholder-gray-500 text-lg mb-4" placeholder="Type or paste your text here..."></textarea>

            <!-- Live Stats Counter -->
            <div class="grid grid-cols-2 sm:grid-cols-4 gap-4 mb-6 text-center">
                <div class="bg-slate-900 p-3 rounded-lg border border-slate-700">
                    <span class="block text-xs uppercase text-gray-400 font-semibold">Characters (No Spaces)</span>
                    <span id="charCount" class="text-xl font-bold text-blue-400">0</span>
                </div>
                <div class="bg-slate-900 p-3 rounded-lg border border-slate-700">
                    <span class="block text-xs uppercase text-gray-400 font-semibold">Words</span>
                    <span id="wordCount" class="text-xl font-bold text-emerald-400">0</span>
                </div>
                <div class="bg-slate-900 p-3 rounded-lg border border-slate-700">
                    <span class="block text-xs uppercase text-gray-400 font-semibold">Lines</span>
                    <span id="lineCount" class="text-xl font-bold text-amber-400">0</span>
                </div>
                <div class="bg-slate-900 p-3 rounded-lg border border-slate-700">
                    <span class="block text-xs uppercase text-gray-400 font-semibold">Paragraphs</span>
                    <span id="paraCount" class="text-xl font-bold text-purple-400">0</span>
                </div>
            </div>

            <!-- Action Buttons Grid -->
            <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-3 mb-6">
                <button onclick="transformText('upper')" class="bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 px-3 rounded-lg transition text-sm cursor-pointer">UPPERCASE</button>
                <button onclick="transformText('lower')" class="bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 px-3 rounded-lg transition text-sm cursor-pointer">lowercase</button>
                <button onclick="transformText('title')" class="bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 px-3 rounded-lg transition text-sm cursor-pointer">Title Case</button>
                <button onclick="transformText('clean')" class="bg-emerald-600 hover:bg-emerald-700 text-white font-medium py-2 px-3 rounded-lg transition text-sm cursor-pointer">Remove Extra Spaces</button>
                <button onclick="transformText('slug')" class="bg-amber-600 hover:bg-amber-700 text-white font-medium py-2 px-3 rounded-lg transition text-sm cursor-pointer">Convert to Slug</button>
                <button onclick="clearText()" class="bg-rose-600 hover:bg-rose-700 text-white font-medium py-2 px-3 rounded-lg transition text-sm cursor-pointer">Clear Content</button>
                <button onclick="copyToClipboard()" class="col-span-2 sm:col-span-1 md:col-span-2 bg-slate-700 hover:bg-slate-600 text-white font-bold py-2 px-3 rounded-lg transition text-sm flex items-center justify-center gap-1 cursor-pointer">
                    📋 Copy Result
                </button>
            </div>

            <hr class="border-slate-700 my-6">

            <!-- Advanced Utilities Panel -->
            <div class="space-y-4">
                <h3 class="text-md font-bold text-slate-400 uppercase tracking-wider mb-2">🛠️ Advanced Smart Tools</h3>
                
                <!-- Row 1: Random Text & Password Generators -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <!-- Random Text Generator -->
                    <div class="bg-slate-900/60 p-4 rounded-xl border border-slate-700/80 flex items-center justify-between gap-2">
                        <div class="flex items-center gap-2">
                            <label class="text-xs text-slate-400 font-semibold uppercase">Paras:</label>
                            <input type="number" id="loremCount" min="1" max="5" value="1" class="w-12 p-1 bg-slate-800 border border-slate-600 rounded text-center text-sm text-white focus:outline-none focus:border-blue-500">
                        </div>
                        <button onclick="generateRandomText()" class="bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-1.5 px-3 rounded-lg transition text-xs cursor-pointer">
                            ✨ Random Text
                        </button>
                    </div>

                    <!-- Password Generator -->
                    <div class="bg-slate-900/60 p-4 rounded-xl border border-slate-700/80 flex items-center justify-between gap-2">
                        <div class="flex items-center gap-2">
                            <label class="text-xs text-slate-400 font-semibold uppercase">Length:</label>
                            <input type="number" id="passLength" min="6" max="30" value="12" class="w-14 p-1 bg-slate-800 border border-slate-600 rounded text-center text-sm text-white focus:outline-none focus:border-blue-500">
                        </div>
                        <button onclick="generatePassword()" class="bg-teal-600 hover:bg-teal-700 text-white font-medium py-1.5 px-3 rounded-lg transition text-xs cursor-pointer">
                            🔑 Generate Pass
                        </button>
                    </div>
                </div>

                <!-- Row 2: Secret Message Encryption Panel -->
                <div class="bg-slate-900/60 p-4 rounded-xl border border-slate-700/80 flex flex-col sm:flex-row items-center justify-between gap-3">
                    <div class="text-left">
                        <span class="block text-xs uppercase text-gray-400 font-semibold">Secret Messaging</span>
                        <p class="text-xs text-slate-500">Encrypt text into secure code or decrypt it back.</p>
                    </div>
                    <div class="flex gap-2 w-full sm:w-auto">
                        <button onclick="cipherText('encrypt')" class="w-1/2 sm:w-auto bg-violet-600 hover:bg-violet-700 text-white font-medium py-1.5 px-4 rounded-lg transition text-xs cursor-pointer">🔒 Encrypt</button>
                        <button onclick="cipherText('decrypt')" class="w-1/2 sm:w-auto bg-fuchsia-600 hover:bg-fuchsia-700 text-white font-medium py-1.5 px-4 rounded-lg transition text-xs cursor-pointer">🔓 Decrypt</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Ad Placeholder -->
        <div class="bg-slate-900 border border-dashed border-slate-700 rounded-xl p-4 text-center text-xs text-gray-500 mb-8 tracking-wider">
            ADVERTISEMENT SPACE (PLACE AD CODE HERE LATER)
        </div>
    </div>

    <!-- Core Logic -->
    <script>
        const textarea = document.getElementById('mainInput');
        
        textarea.addEventListener('input', () => {
            const text = textarea.value;
            
            // FIXED: Counts characters excluding all types of spaces
            const noSpacesText = text.replace(/\s/g, '');
            document.getElementById('charCount').textContent = noSpacesText.length;
            
            // Word Count
            const words = text.trim().split(/\s+/).filter(word => word.length > 0);
            document.getElementById('wordCount').textContent = words.length;
            
            // Line Count
            const lines = text.split('\n').filter(line => line.length > 0);
            document.getElementById('lineCount').textContent = text.length > 0 ? lines.length : 0;
            
            // Paragraph Count
            const paras = text.split(/\n\s*\n/).filter(p => p.trim().length > 0);
            document.getElementById('paraCount').textContent = text.length > 0 ? paras.length : 0;
        });

        function transformText(type) {
            let currentText = textarea.value;
            if(!currentText.trim()) return;

            switch(type) {
                case 'upper': textarea.value = currentText.toUpperCase(); break;
                case 'lower': textarea.value = currentText.toLowerCase(); break;
                case 'title': textarea.value = currentText.replace(/\w\S*/g, (txt) => txt.charAt(0).toUpperCase() + txt.substr(1).toLowerCase()); break;
                case 'clean': textarea.value = currentText.replace(/\s+/g, ' ').trim(); break;
                case 'slug': textarea.value = currentText.toLowerCase().replace(/[^a-z0-9\s-]/g, '').replace(/\s+/g, '-').replace(/-+/g, '-').trim(); break;
            }
            textarea.dispatchEvent(new Event('input'));
        }

        function clearText() {
            textarea.value = '';
            textarea.dispatchEvent(new Event('input'));
        }

        function copyToClipboard() {
            if(!textarea.value) return;
            navigator.clipboard.writeText(textarea.value);
            alert('Text copied to clipboard! 👍');
        }

        // ================= NEW TOOLS LOGIC =================

        // 1. Random Text Generator Function
        document.getElementById('loremCount').addEventListener('change', function() {
            if(this.value > 5) this.value = 5;
            if(this.value < 1) this.value = 1;
        });

        function generateRandomText() {
            const paragraphs = [
                "Lorem ipsum dolor sit amet, consectetur adipiscing elit. Proin ac ut id urna, pretium sed. Morbi feugiat interdum purus et sodales. Mauris sit amet massa eget lectus eleifend dictum ut id erat.",
                "Vestibulum ante ipsum primis in faucibus orci luctus et ultrices posuere cubilia curae; Aliquam sit amet sodales dolor. Phasellus dictum justo a purus facilisis, vel congue elit rhoncus.",
                "Morbi sit amet ex ac tellus tincidunt dictum. Aliquam convallis neque sed hendrerit sodales. Interdum et malesuada fames ac ante ipsum primis in faucibus. Proin gravida finibus ex vel eleifend.",
                "Nulla facilisi. Etiam nec tortor in massa efficitur dictum. Curabitur vel accumsan diam, sed facilisis erat. Sed congue, sapien elementum aliquet finibus, nisl ante lacinia lectus, id sodales lorem.",
                "Curabitur non interdum arcu. Cras imperdiet elementum metus vel laoreet. Duis elementum pretium ex at pretium. Ut eu varius justo, sit amet vulputate nisi. Vivamus elementum convallis tellus."
            ];
            
            const count = parseInt(document.getElementById('loremCount').value) || 1;
            let result = [];
            for (let i = 0; i < count; i++) {
                result.push(paragraphs[i % paragraphs.length]);
            }
            
            textarea.value = result.join("\n\n");
            textarea.dispatchEvent(new Event('input'));
        }

        // 2. Password Generator Function
        function generatePassword() {
            const length = parseInt(document.getElementById('passLength').value) || 12;
            const chars = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*()_+~`|}{[]:;?><,./-=";
            let password = "";
            for (let i = 0; i < length; i++) {
                password += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            textarea.value = password;
            textarea.dispatchEvent(new Event('input'));
        }

        // 3. Secret Message Function (Base64 Cipher)
        function cipherText(action) {
            const text = textarea.value.trim();
            if(!text) return;

            try {
                if (action === 'encrypt') {
                    // Encrypts text to base64 format safely
                    textarea.value = btoa(unescape(encodeURIComponent(text)));
                } else if (action === 'decrypt') {
                    // Decrypts base64 string back to standard text
                    textarea.value = decodeURIComponent(escape(atob(text)));
                }
                textarea.dispatchEvent(new Event('input'));
            } catch (err) {
                alert("Error: Invalid formatting for encryption/decryption! ❌");
            }
        }
    </script>
</body>
</html>
