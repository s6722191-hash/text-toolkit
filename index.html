<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartText Tools - Free Online Text Formatter & Counter</title>
    
    <meta name="description" content="Free online text utility tool to count words, remove extra spaces, convert case, and generate clean slugs instantly.">
    <meta name="keywords" content="word counter, remove extra spaces online, case converter, text formatter, free text tools">
    <meta name="robots" content="index, follow">
    
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        /* Custom styles for animations and smooth transitions */
        .transition-theme { transition: background-color 0.3s ease, border-color 0.3s ease, color 0.3s ease; }
        
        /* Heading Shimmer Effect */
        @keyframes shimmer {
            0% { background-position: -200% center; }
            100% { background-position: 200% center; }
        }
        .animate-shimmer {
            background: linear-gradient(90deg, #3b82f6, #8b5cf6, #ec4899, #3b82f6);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmer 4s linear infinite;
        }
    </style>
</head>
<body id="bodyTheme" class="p-4 md:p-8 bg-slate-900 text-slate-100 min-h-screen transition-theme">

    <div class="max-w-4xl mx-auto">
        <header class="relative text-center mb-8 mt-4">
            <button onclick="toggleTheme()" id="themeBtn" class="absolute top-0 right-0 p-2.5 bg-slate-800 dark:bg-slate-700 border border-slate-700 dark:border-slate-600 rounded-xl hover:bg-slate-700 transition active:scale-90 cursor-pointer shadow-md text-lg" title="Toggle Theme">
                🌙
            </button>
            
            <h1 class="text-3xl md:text-4xl font-extrabold mb-2 flex justify-center items-center gap-1">
                <span>⚡</span><span class="animate-shimmer">SmartText Utility Pro</span>
            </h1>
            <p id="subHeader" class="text-gray-400 text-sm md:text-base transition-theme">Format, clean, and analyze your text instantly. No logs, 100% secure.</p>
        </header>

        <div id="mainCard" class="bg-slate-800 rounded-2xl p-6 shadow-xl border border-slate-700 mb-8 transition-theme">
            <textarea id="mainInput" class="w-full h-64 bg-slate-900 text-slate-100 p-4 rounded-xl border border-slate-600 focus:outline-none focus:border-blue-500 resize-y placeholder-gray-500 text-lg mb-4 transition-theme" placeholder="Type or paste your text here..."></textarea>

            <div class="grid grid-cols-2 sm:grid-cols-4 gap-4 mb-6 text-center">
                <div id="statBox1" class="bg-slate-900 p-3 rounded-lg border border-slate-700 transition-theme">
                    <span class="block text-xs uppercase text-gray-400 font-semibold">Characters (No Spaces)</span>
                    <span id="charCount" class="text-xl font-bold text-blue-400">0</span>
                </div>
                <div id="statBox2" class="bg-slate-900 p-3 rounded-lg border border-slate-700 transition-theme">
                    <span class="block text-xs uppercase text-gray-400 font-semibold">Words</span>
                    <span id="wordCount" class="text-xl font-bold text-emerald-400">0</span>
                </div>
                <div id="statBox3" class="bg-slate-900 p-3 rounded-lg border border-slate-700 transition-theme">
                    <span class="block text-xs uppercase text-gray-400 font-semibold">Lines</span>
                    <span id="lineCount" class="text-xl font-bold text-amber-400">0</span>
                </div>
                <div id="statBox4" class="bg-slate-900 p-3 rounded-lg border border-slate-700 transition-theme">
                    <span class="block text-xs uppercase text-gray-400 font-semibold">Paragraphs</span>
                    <span id="paraCount" class="text-xl font-bold text-purple-400">0</span>
                </div>
            </div>

            <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-3 mb-6">
                <button onclick="transformText('upper')" class="bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 px-3 rounded-lg transition transform active:scale-95 text-sm cursor-pointer shadow-md">UPPERCASE</button>
                <button onclick="transformText('lower')" class="bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 px-3 rounded-lg transition transform active:scale-95 text-sm cursor-pointer shadow-md">lowercase</button>
                <button onclick="transformText('title')" class="bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 px-3 rounded-lg transition transform active:scale-95 text-sm cursor-pointer shadow-md">Title Case</button>
                <button onclick="transformText('clean')" class="bg-emerald-600 hover:bg-emerald-700 text-white font-medium py-2 px-3 rounded-lg transition transform active:scale-95 text-sm cursor-pointer shadow-md">Remove Extra Spaces</button>
                <button onclick="transformText('slug')" class="bg-amber-600 hover:bg-amber-700 text-white font-medium py-2 px-3 rounded-lg transition transform active:scale-95 text-sm cursor-pointer shadow-md">Convert to Slug</button>
                <button onclick="clearText()" class="bg-rose-600 hover:bg-rose-700 text-white font-medium py-2 px-3 rounded-lg transition transform active:scale-95 text-sm cursor-pointer shadow-md">Clear Content</button>
                <button onclick="copyToClipboard()" id="copyBtn" class="col-span-2 sm:col-span-1 md:col-span-2 bg-slate-700 hover:bg-slate-600 text-white font-bold py-2 px-3 rounded-lg transition transform active:scale-95 text-sm flex items-center justify-center gap-1 cursor-pointer shadow-md">
                    📋 Copy Result
                </button>
            </div>

            <hr class="border-slate-700 my-6">

            <div class="space-y-4">
                <h3 id="panelTitle" class="text-md font-bold text-slate-400 uppercase tracking-wider mb-2 transition-theme">🛠️ Advanced Smart Tools</h3>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div id="utilBox1" class="bg-slate-900/60 p-4 rounded-xl border border-slate-700/80 flex items-center justify-between gap-2 transition-theme">
                        <div class="flex items-center gap-2">
                            <label id="lblParas" class="text-xs text-slate-400 font-semibold uppercase transition-theme">Paras:</label>
                            <input type="number" id="loremCount" min="1" max="5" value="1" class="w-12 p-1 bg-slate-800 border border-slate-600 rounded text-center text-sm text-white focus:outline-none focus:border-blue-500 transition-theme">
                        </div>
                        <button onclick="generateRandomText()" class="bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-1.5 px-3 rounded-lg transition transform active:scale-95 text-xs cursor-pointer shadow-sm">
                            ✨ Random Text
                        </button>
                    </div>

                    <div id="utilBox2" class="bg-slate-900/60 p-4 rounded-xl border border-slate-700/80 flex items-center justify-between gap-2 transition-theme">
                        <div class="flex items-center gap-2">
                            <label id="lblLength" class="text-xs text-slate-400 font-semibold uppercase transition-theme">Length:</label>
                            <input type="number" id="passLength" min="6" max="30" value="12" class="w-14 p-1 bg-slate-800 border border-slate-600 rounded text-center text-sm text-white focus:outline-none focus:border-blue-500 transition-theme">
                        </div>
                        <button onclick="generatePassword()" class="bg-teal-600 hover:bg-teal-700 text-white font-medium py-1.5 px-3 rounded-lg transition transform active:scale-95 text-xs cursor-pointer shadow-sm">
                            🔑 Generate Pass
                        </button>
                    </div>
                </div>

                <div id="utilBox3" class="bg-slate-900/60 p-4 rounded-xl border border-slate-700/80 flex flex-col sm:flex-row items-center justify-between gap-3 transition-theme">
                    <div class="text-left">
                        <span id="lblSecret" class="block text-xs uppercase text-gray-400 font-semibold transition-theme">Secret Messaging</span>
                        <p id="subSecret" class="text-xs text-slate-500 transition-theme">Encrypt text into secure code or decrypt it back.</p>
                    </div>
                    <div class="flex gap-2 w-full sm:w-auto">
                        <button onclick="cipherText('encrypt')" class="w-1/2 sm:w-auto bg-violet-600 hover:bg-violet-700 text-white font-medium py-1.5 px-4 rounded-lg transition transform active:scale-95 text-xs cursor-pointer shadow-sm">🔒 Encrypt</button>
                        <button onclick="cipherText('decrypt')" class="w-1/2 sm:w-auto bg-fuchsia-600 hover:bg-fuchsia-700 text-white font-medium py-1.5 px-4 rounded-lg transition transform active:scale-95 text-xs cursor-pointer shadow-sm">🔓 Decrypt</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const textarea = document.getElementById('mainInput');
        
        // Counter Event Listener
        textarea.addEventListener('input', () => {
            const text = textarea.value;
            
            // Counts characters excluding all types of spaces
            const noSpacesText = text.replace(/\s/g, '');
            document.getElementById('charCount').textContent = noSpacesText.length;
            
            // Word Count
            const words = text.trim().split(/\s+/).filter(word => word.length > 0);
            document.getElementById('wordCount').textContent = words.length;
            
            // Line Count
            const lines = text.split('\n').filter(line => line.length > 0);
            document.getElementById('lineCount').textContent = text.length > 0 ? lines.length : 0;
            
            // Paragraph Count
            const paras = text.split(/\n\s*\n/).filter(p => p.trim().length > 0);
            document.getElementById('paraCount').textContent = text.length > 0 ? paras.length : 0;
        });

        // Basic Formatting Functions
        function transformText(type) {
            let currentText = textarea.value;
            if(!currentText.trim()) return;

            switch(type) {
                case 'upper': textarea.value = currentText.toUpperCase(); break;
                case 'lower': textarea.value = currentText.toLowerCase(); break;
                case 'title': textarea.value = currentText.replace(/\w\S*/g, (txt) => txt.charAt(0).toUpperCase() + txt.substr(1).toLowerCase()); break;
                case 'clean': textarea.value = currentText.replace(/\s+/g, ' ').trim(); break;
                case 'slug': textarea.value = currentText.toLowerCase().replace(/[^a-z0-9\s-]/g, '').replace(/\s+/g, '-').replace(/-+/g, '-').trim(); break;
            }
            textarea.dispatchEvent(new Event('input'));
        }

        function clearText() {
            textarea.value = '';
            textarea.dispatchEvent(new Event('input'));
        }

        function copyToClipboard() {
            if(!textarea.value) return;
            navigator.clipboard.writeText(textarea.value);
            
            // Responsive button visual feedback
            const copyBtn = document.getElementById('copyBtn');
            const oldHtml = copyBtn.innerHTML;
            copyBtn.innerHTML = "✓ Copied!";
            copyBtn.classList.replace('bg-slate-700', 'bg-emerald-600');
            
            setTimeout(() => {
                copyBtn.innerHTML = oldHtml;
                copyBtn.classList.replace('bg-emerald-600', 'bg-slate-700');
            }, 1500);
        }

        // 1. Random Text Generator Function
        document.getElementById('loremCount').addEventListener('change', function() {
            if(this.value > 5) this.value = 5;
            if(this.value < 1) this.value = 1;
        });

        function generateRandomText() {
            const paragraphs = [
                "Lorem ipsum dolor sit amet, consectetur adipiscing elit. Proin ac ut id urna, pretium sed. Morbi feugiat interdum purus et sodales. Mauris sit amet massa eget lectus eleifend dictum ut id erat.",
                "Vestibulum ante ipsum primis in faucibus orci luctus et ultrices posuere cubilia curae; Aliquam sit amet sodales dolor. Phasellus dictum justo a purus facilisis, vel congue elit rhoncus.",
                "Morbi sit amet ex ac tellus tincidunt dictum. Aliquam convallis neque sed hendrerit sodales. Interdum et malesuada fames ac ante ipsum primis in faucibus. Proin gravida finibus ex vel eleifend.",
                "Nulla facilisi. Etiam nec tortor in massa efficitur dictum. Curabitur vel accumsan diam, sed facilisis erat. Sed congue, sapien elementum aliquet finibus, nisl ante lacinia lectus, id sodales lorem.",
                "Curabitur non interdum arcu. Cras imperdiet elementum metus vel laoreet. Duis elementum pretium ex at pretium. Ut eu varius justo, sit amet vulputate nisi. Vivamus elementum convallis tellus."
            ];
            
            const count = parseInt(document.getElementById('loremCount').value) || 1;
            let result = [];
            for (let i = 0; i < count; i++) {
                result.push(paragraphs[i % paragraphs.length]);
            }
            
            textarea.value = result.join("\n\n");
            textarea.dispatchEvent(new Event('input'));
        }

        // 2. Password Generator Function
        function generatePassword() {
            const length = parseInt(document.getElementById('passLength').value) || 12;
            const chars = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*()_+~`|}{[]:;?><,./-=";
            let password = "";
            for (let i = 0; i < length; i++) {
                password += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            textarea.value = password;
            textarea.dispatchEvent(new Event('input'));
        }

        // 3. Secret Message Function (Base64 Cipher)
        function cipherText(action) {
            const text = textarea.value.trim();
            if(!text) return;

            try {
                if (action === 'encrypt') {
                    textarea.value = btoa(unescape(encodeURIComponent(text)));
                } else if (action === 'decrypt') {
                    textarea.value = decodeURIComponent(escape(atob(text)));
                }
                textarea.dispatchEvent(new Event('input'));
            } catch (err) {
                alert("Error: Invalid code format for decryption! ❌");
            }
        }

        // 4. Dark / Light Mode Theme Engine Logic
        let isDarkMode = true;
        
        function toggleTheme() {
            isDarkMode = !isDarkMode;
            const body = document.getElementById('bodyTheme');
            const mainCard = document.getElementById('mainCard');
            const mainInput = document.getElementById('mainInput');
            const subHeader = document.getElementById('subHeader');
            const themeBtn = document.getElementById('themeBtn');
            const panelTitle = document.getElementById('panelTitle');
            const lblParas = document.getElementById('lblParas');
            const lblLength = document.getElementById('lblLength');
            const lblSecret = document.getElementById('lblSecret');
            const subSecret = document.getElementById('subSecret');
            
            const statBoxes = [1, 2, 3, 4].map(id => document.getElementById(`statBox${id}`));
            const utilBoxes = [1, 2, 3].map(id => document.getElementById(`utilBox${id}`));

            if (!isDarkMode) {
                // Apply Light Mode Classes
                body.classList.replace('bg-slate-900', 'bg-slate-50');
                body.classList.replace('text-slate-100', 'text-slate-800');
                mainCard.classList.replace('bg-slate-800', 'bg-white');
                mainCard.classList.replace('border-slate-700', 'border-gray-200');
                mainInput.classList.replace('bg-slate-900', 'bg-gray-50');
                mainInput.classList.replace('text-slate-100', 'text-gray-900');
                mainInput.classList.replace('border-slate-600', 'border-gray-300');
                subHeader.classList.replace('text-gray-400', 'text-gray-600');
                themeBtn.classList.replace('bg-slate-800', 'bg-gray-200');
                themeBtn.classList.replace('border-slate-700', 'border-gray-300');
                panelTitle.classList.replace('text-slate-400', 'text-gray-500');
                lblParas.classList.replace('text-slate-400', 'text-gray-600');
                lblLength.classList.replace('text-slate-400', 'text-gray-600');
                lblSecret.classList.replace('text-gray-400', 'text-gray-700');
                subSecret.classList.replace('text-slate-500', 'text-gray-500');
                
                statBoxes.forEach(box => {
                    box.classList.replace('bg-slate-900', 'bg-gray-100');
                    box.classList.replace('border-slate-700', 'border-gray-200');
                });
                utilBoxes.forEach(box => {
                    box.classList.replace('bg-slate-900/60', 'bg-gray-100');
                    box.classList.replace('border-slate-700/80', 'border-gray-200');
                });
                
                themeBtn.innerHTML = "☀️";
            } else {
                // Apply Dark Mode Classes
                body.classList.replace('bg-slate-50', 'bg-slate-900');
                body.classList.replace('text-slate-800', 'text-slate-100');
                mainCard.classList.replace('bg-white', 'bg-slate-800');
                mainCard.classList.replace('border-gray-200', 'border-slate-700');
                mainInput.classList.replace('bg-gray-50', 'bg-slate-900');
                mainInput.classList.replace('text-gray-900', 'text-slate-100');
                mainInput.classList.replace('border-gray-300', 'border-slate-600');
                subHeader.classList.replace('text-gray-600', 'text-gray-400');
                themeBtn.classList.replace('bg-gray-200', 'bg-slate-800');
                themeBtn.classList.replace('border-gray-300', 'border-slate-700');
                panelTitle.classList.replace('text-gray-500', 'text-slate-400');
                lblParas.classList.replace('text-gray-600', 'text-slate-400');
                lblLength.classList.replace('text-gray-600', 'text-slate-400');
                lblSecret.classList.replace('text-gray-700', 'text-gray-400');
                subSecret.classList.replace('text-gray-500', 'text-slate-500');

                statBoxes.forEach(box => {
                    box.classList.replace('bg-gray-100', 'bg-slate-900');
                    box.classList.replace('border-gray-200', 'border-slate-700');
                });
                utilBoxes.forEach(box => {
                    box.classList.replace('bg-gray-100', 'bg-slate-900/60');
                    box.classList.replace('border-gray-200', 'border-slate-700/80');
                });

                themeBtn.innerHTML = "🌙";
            }
        }
    </script>
</body>
</html>
