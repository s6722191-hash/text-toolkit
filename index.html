<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartText Tools - Free Online Text Formatter & Counter</title>
    <meta name="google-site-verification" content="JOHD5bZ5AE9LTQF4HLp52RfB5P78Zu6b155NSRTCjIw" />
    
    <meta name="description" content="Free online text utility tool to count words, remove extra spaces online, case converter, text formatter.">
    <meta name="keywords" content="word counter, remove extra spaces online, case converter, text tools">
    <meta name="robots" content="index, follow">

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: sans-serif; }
    </style>
</head>
<body class="p-4 md:p-8 flex flex-col items-center min-h-screen">

    <div class="w-full max-w-3xl bg-slate-800 p-6 rounded-2xl shadow-xl border border-slate-700">
        <h1 class="text-2xl md:text-3xl font-bold text-center text-indigo-400 mb-6">SmartText Toolkit 🛠️</h1>
        
        <textarea id="textInput" class="w-full h-48 p-4 bg-slate-900 border border-slate-700 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:outline-none placeholder-slate-500 text-slate-100" placeholder="Apna text yahan paste ya type karein..."></textarea>
        
        <div class="mt-2 text-sm text-slate-400 flex gap-4 justify-end font-mono">
            <span>Words: <span id="wordCount" class="text-indigo-400 font-bold">0</span></span>
            <span>Characters: <span id="charCount" class="text-indigo-400 font-bold">0</span></span>
        </div>

        <div class="grid grid-cols-2 sm:grid-cols-4 gap-3 mt-6">
            <button id="clearSpacesBtn" class="bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2.5 px-4 rounded-xl transition duration-200 text-sm cursor-pointer shadow-md">
                Clear Spaces
            </button>
            <button id="uppercaseBtn" class="bg-slate-700 hover:bg-slate-600 text-white font-medium py-2.5 px-4 rounded-xl transition duration-200 text-sm cursor-pointer shadow-md">
                UPPERCASE
            </button>
            <button id="lowercaseBtn" class="bg-slate-700 hover:bg-slate-600 text-white font-medium py-2.5 px-4 rounded-xl transition duration-200 text-sm cursor-pointer shadow-md">
                lowercase
            </button>
            <button id="copyBtn" class="bg-emerald-600 hover:bg-emerald-700 text-white font-medium py-2.5 px-4 rounded-xl transition duration-200 text-sm cursor-pointer shadow-md">
                Copy Text
            </button>
        </div>
    </div>

    <script>
        const textInput = document.getElementById('textInput');
        const wordCount = document.getElementById('wordCount');
        const charCount = document.getElementById('charCount');

        // 1. Real-time Word & Character Counter
        textInput.addEventListener('input', () => {
            const text = textInput.value;
            charCount.textContent = text.length;
            
            // Words count logic (handling multiple spaces correctly)
            const words = text.trim().split(/\s+/).filter(word => word.length > 0);
            wordCount.textContent = words.length;
        });

        // 2. Remove Extra Spaces Function
        document.getElementById('clearSpacesBtn').addEventListener('click', () => {
            let text = textInput.value;
            let cleanedText = text.replace(/\s+/g, ' ').trim();
            textInput.value = cleanedText;
            // Update counts after clearing spaces
            textInput.dispatchEvent(new Event('input'));
        });

        // 3. UPPERCASE Function
        document.getElementById('uppercaseBtn').addEventListener('click', () => {
            textInput.value = textInput.value.toUpperCase();
        });

        // 4. Lowercase Function
        document.getElementById('lowercaseBtn').addEventListener('click', () => {
            textInput.value = textInput.value.toLowerCase();
        });

        // 5. Copy to Clipboard Function
        document.getElementById('copyBtn').addEventListener('click', () => {
            if (textInput.value.trim() === "") return;
            
            textInput.select();
            textInput.setSelectionRange(0, 99999); // Mobile optimization
            navigator.clipboard.writeText(textInput.value);

            // Temporary Visual Feedback on Button
            const copyBtn = document.getElementById('copyBtn');
            const originalText = copyBtn.textContent;
            copyBtn.textContent = "Copied! ✓";
            copyBtn.classList.replace('bg-emerald-600', 'bg-slate-600');
            
            setTimeout(() => {
                copyBtn.textContent = originalText;
                copyBtn.classList.replace('bg-slate-600', 'bg-emerald-600');
            }, 1500);
        });
    </script>
</body>
</html>
